version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'carlgerhardsson'
    labels:
      - 'dependencies'
      - 'automated'
    versioning-strategy: increase
    # Group updates to avoid dependency conflicts
    groups:
      # TypeScript ESLint packages must be updated together
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
        update-types:
          - 'minor'
          - 'patch'
      # ESLint and plugins must be compatible
      eslint-ecosystem:
        patterns:
          - 'eslint'
          - 'eslint-plugin-*'
        update-types:
          - 'minor'
          - 'patch'
      # Development dependencies
      development-dependencies:
        dependency-type: 'development'
        exclude-patterns:
          - '@typescript-eslint/*'
          - 'eslint'
          - 'eslint-plugin-*'
        update-types:
          - 'minor'
          - 'patch'
      # Production dependencies
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
    # Ignore major version updates (breaking changes)
    ignore:
      - dependency-name: '@typescript-eslint/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint-plugin-*'
        update-types: ['version-update:semver-major']

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels:
      - 'dependencies'
      - 'github-actions'
